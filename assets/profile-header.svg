    <text x="0" y="91" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="700" letter-spacing="-1.5">Jaeseung Kim</text>
    <text x="0" y="134" fill="#D6E5E2" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400">Medical Imaging AI · MRI Reconstruction · Quantitative MRI · Neuroimaging</text>
  </g>

  <line x1="70" y1="230" x2="846" y2="230" stroke="#FFFFFF" stroke-opacity="0.16"/>
  <text x="70" y="253" fill="#AABFBC" font-family="Arial, Helvetica, sans-serif" font-size="13" letter-spacing="1.3">RESEARCH PROFILE</text>
