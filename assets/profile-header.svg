<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">Jaeseung Kim — Medical Imaging Research</title>
  <desc id="desc">Minimal academic profile banner with abstract MRI and k-space motifs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B172A"/>
      <stop offset="1" stop-color="#123A45"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#65D6C4" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#65D6C4" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#D8F3EE" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="280" rx="22" fill="url(#bg)"/>
  <rect width="1200" height="280" rx="22" fill="url(#grid)"/>
  <circle cx="1010" cy="138" r="190" fill="url(#glow)"/>

  <g transform="translate(927 46)" fill="none" stroke="#BCEBE3">
    <ellipse cx="90" cy="92" rx="70" ry="88" stroke-opacity="0.48" stroke-width="1.4"/>
    <ellipse cx="90" cy="92" rx="53" ry="69" stroke-opacity="0.35" stroke-width="1.2"/>
    <ellipse cx="90" cy="92" rx="36" ry="49" stroke-opacity="0.28" stroke-width="1.1"/>
    <path d="M90 4v176M20 92h140" stroke-opacity="0.2" stroke-width="1"/>
    <path d="M37 45c29 19 75 19 106 0M37 139c29-19 75-19 106 0" stroke-opacity="0.25" stroke-width="1"/>
    <circle cx="90" cy="92" r="4" fill="#65D6C4" stroke="none"/>
  </g>

  <g transform="translate(70 72)">
